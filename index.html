<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teaspoon Graph</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="style.css">

</head>
<body>
	<div id="titleSection" class=titleSection> Untitled Lesson </div>
	<div id="helpButton" class=helpButton>?</div>

	<div class=descriptionFade id="descriptionFade"></div>
	<div class=description id="description"></div>
	<div class=descriptionButton id="descriptionButton">X</div>
	<script defer src="Blocks.js"></script>
	<script defer src="Execution.js"></script>
